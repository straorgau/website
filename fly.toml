# fly.toml app configuration file generated for stra-website-beta on 2025-11-29T11:40:08+11:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stra-website-beta'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
